[program:reverb]
process_name=%(program_name)s
command=php /var/www/artisan reverb:start --host=0.0.0.0 --port=9080
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=3600
