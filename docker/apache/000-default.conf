<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot ${APACHE_DOCUMENT_ROOT}

    # Stream log ke stdout/stderr supaya tampil di `docker logs`
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined

    # Reverse proxy for Laravel Reverb WebSocket
    ProxyPreserveHost On

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/app/(.*) ws://127.0.0.1:9080/app/$1 [P,L]

    ProxyPass /app http://127.0.0.1:9080/app
    ProxyPassReverse /app http://127.0.0.1:9080/app
</VirtualHost>
